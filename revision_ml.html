<h2>Régression linéaire (CM #2)</h2>
<p>Le plus ancien modèle statistique. Inventée par Legendre (1805) et formalisée par Gauss (1809). On postule que Y est une combinaison linéaire des X :</p>
<div class="formula">Y = β₀ + β₁·X₁ + β₂·X₂ + ... + βₙ·Xₙ + ε</div>

<div class="zoom-box">
<div class="zoom-title">🔍 ZOOM — Méthode des moindres carrés (OLS)</div>
<p>L'algorithme cherche les coefficients qui minimisent la <strong>somme des carrés des écarts</strong> entre prédictions et vraies valeurs. Pourquoi les carrés et pas les valeurs absolues ? Trois raisons :</p>
<ol>
<li>Les carrés pénalisent davantage les grands écarts (erreur de 4 = 16× pire qu'une erreur de 1)</li>
<li>Les carrés sont dérivables partout — solution analytique élégante</li>
<li>Sous résidus gaussiens, c'est l'estimateur optimal (théorème de Gauss-Markov)</li>
</ol>
<p>Formule matricielle : β̂ = (XᵀX)⁻¹ Xᵀy. Solution en une seule étape, contrairement à un réseau de neurones.</p>
</div>

<div class="zoom-box">
<div class="zoom-title">🔍 ZOOM — Loi normale (gaussienne)</div>
<p>La distribution la plus importante en stats, entièrement caractérisée par μ (moyenne) et σ (écart-type). <strong>Règle 68-95-99.7</strong> : 68% des observations dans [μ-σ, μ+σ], 95% dans [μ-2σ, μ+2σ], 99.7% dans [μ-3σ, μ+3σ].</p>
<p>La régression linéaire suppose des résidus gaussiens. Dans ton projet, log(prix) est plus gaussien que prix brut — c'est une justification pour transformer Y.</p>
</div>

<p><strong>Ton résultat :</strong> R² = 0.9193. Le modèle explique 92% de la variance du prix.</p>

<h2>Ridge — régularisation L2</h2>
<p>Régression linéaire + pénalité α × Σ(βᵢ²). Empêche les coefficients de devenir trop grands. Atténue la multicolinéarité. <strong>Ton résultat : R² = 0.9006.</strong></p>

<h2>Lasso — régularisation L1</h2>
<p>LASSO = Least Absolute Shrinkage and Selection Operator. Pénalité α × Σ|βᵢ|. Propriété géométrique remarquable : <strong>annule certains coefficients</strong>, donc sélection automatique de variables. <strong>Ton résultat : R² = 0.8927.</strong></p>

<h2>Arbre de décision (CM #3)</h2>
<p>Apprend une série de règles si/alors qui découpent l'espace en zones rectangulaires. Critère de découpage : réduction de variance (régression), Gini ou <strong>entropie de Shannon</strong> (classification).</p>

<div class="zoom-box">
<div class="zoom-title">🔍 ZOOM — Entropie de Shannon</div>
<p>Inventée par Shannon en 1948. Mesure de l'incertitude.</p>
<div class="formula">H(P) = − Σᵢ P(eᵢ) · log₂ P(eᵢ)</div>
<p><strong>Trois cas à connaître par cœur :</strong></p>
<ul>
<li>Événement certain (P=1) → entropie = 0</li>
<li>Deux événements équiprobables → entropie = 1 bit</li>
<li>k événements équiprobables → entropie = log₂(k)</li>
</ul>
<p><strong>Exemple sujet 2025 :</strong> P(e1)=0.5, P(e2)=P(e3)=0.25. H = 0.5×1 + 0.25×2 + 0.25×2 = <strong>1.5 bits</strong>.</p>
<p>L'algorithme ID3 (Quinlan, 1986) choisit la variable qui maximise le gain d'information = réduction d'entropie.</p>
</div>

<h2>Random Forest (CM #3 — Ensemble Learning)</h2>
<p>Décision par comité. On entraîne 100 arbres sur des sous-échantillons bootstrap, on moyenne. Stable, robuste, fournit une mesure d'importance des variables.</p>

<h2>Gradient Boosting</h2>
<p>Arbres entraînés en séquence : chaque arbre corrige les erreurs (résidus) du précédent. Variantes XGBoost, LightGBM, CatBoost — dominent les compétitions Kaggle.</p>

<p>The algorithm minimizes the <strong>sum of squared errors</strong> between predictions and true values. Why squares and not absolute values?</p>

<h2>Le principe du Reinforcement Learning</h2>
<p>RL = Reinforcement Learning. <strong>Définition :</strong> apprendre en interagissant avec son environnement pour atteindre un but. Inspiré du behaviorisme de Skinner.</p>
<p>Trois signaux entre l'agent et l'environnement à chaque pas de temps : <strong>état (s)</strong>, <strong>action (a)</strong>, <strong>récompense (r)</strong>. Objectif : maximiser la somme cumulée des récompenses.</p>

<h2>Le formalisme MDP</h2>
<p>MDP = Markov Decision Process (processus de décision markovien). Un MDP fini est un tuple <strong>(S, A, T, R, γ)</strong> :</p>
<ul>
<li><strong>S</strong> : ensemble fini d'états (les situations possibles)</li>
<li><strong>A(s)</strong> : actions disponibles dans chaque état s</li>
<li><strong>T : S × A → S</strong> : fonction de transition entre états</li>
<li><strong>R : S × A → ℝ</strong> : fonction de récompense</li>
<li><strong>γ (gamma)</strong> : facteur d'actualisation entre 0 et 1</li>
</ul>

<div class="tip-box">
<div class="tip-title">💡 Méthodologie en 5 étapes pour formaliser un MDP</div>
<ol>
<li><strong>Définir S</strong> : quelles informations l'agent doit-il connaître pour décider ?</li>
<li><strong>Définir A(s)</strong> : quelles actions sont possibles dans chaque état ?</li>
<li><strong>Définir T(s, a)</strong> : si je fais a dans s, où vais-je ?</li>
<li><strong>Définir R(s, a)</strong> : reflète ce que tu VEUX que l'agent apprenne (+100 pour le but, -1 par mouvement)</li>
<li><strong>Fixer γ</strong> : 0.9 est très courant</li>
</ol>
</div>

<h2>La propriété de Markov</h2>
<p>Un état est markovien si la probabilité du prochain état ne dépend que de l'état courant et de l'action courante — <strong>pas de tout l'historique</strong>.</p>
<p>Échecs = markovien (la position résume tout). Poker = pas exactement markovien (l'historique des cartes joue).</p>

<div class="zoom-box">
<div class="zoom-title">🔍 ZOOM — L'équation de Bellman</div>
<p>Pilier mathématique du RL, due à Richard Bellman (1953).</p>
<p><strong>Intuition</strong> : la valeur d'un état = ce que je gagne tout de suite + valeur actualisée de l'état suivant.</p>
<div class="formula">V*(s) = max<sub>a</sub> [R(s, a) + γ · Σ<sub>s'</sub> P(s,a,s') · V*(s')]</div>
<p>Version Q (utilisée en Q-Learning) :</p>
<div class="formula">Q*(s, a) = Σ<sub>s'</sub> P(s,a,s') · [R(s,a,s') + γ · max<sub>a'</sub> Q*(s', a')]</div>

<tr style="background: var(--bg);"><td style="padding: 0.8rem;">Q-Learning</td><td style="padding: 0.8rem;">Dynamique inconnue (TD learning)</td></tr>
<tr><td style="padding: 0.8rem;">SARSA</td><td style="padding: 0.8rem;">On-policy (apprend la politique suivie)</td></tr>
</table>

<h2>L'algorithme Q-Learning</h2>
<div class="formula" style="text-align: left;">
Initialiser Q(s, a) = 0<br>
Pour chaque épisode :<br>

&nbsp;&nbsp;&nbsp;&nbsp;Choisir a (ε-greedy)<br>

<h2>Exploration / Exploitation</h2>
<p><strong>ε-Greedy</strong> : avec probabilité 1-ε, prendre la meilleure action connue (exploitation). Avec probabilité ε, prendre une action aléatoire (exploration). ε diminue progressivement.</p>

<h2>L'idée fondatrice du CNN</h2>
<p>Un CNN est conçu pour traiter des données ayant une structure spatiale, principalement les images. <strong>Idée géniale</strong> : au lieu de connecter chaque neurone à toutes les entrées (comme dans un MLP), on utilise des filtres locaux qui glissent sur l'image.</p>
<p>Trois bénéfices :</p>
<ul>
<li><strong>Localité</strong> — motifs locaux détectés sans dépendre de leur position absolue</li>
<li><strong>Partage de paramètres</strong> — même filtre partout</li>
<li><strong>Invariance par translation</strong> — un chat reconnu à gauche est reconnu à droite</li>
</ul>

<div class="warning-box">
<div class="warn-title">⚠️ FORMULE À CONNAÎTRE PAR CŒUR</div>
<p>Si l'entrée a une taille <strong>H × W</strong>, le kernel <strong>K × K</strong>, padding <strong>P</strong>, stride <strong>S</strong> :</p>
<div class="formula">Taille de sortie = ⌊(H + 2P − K) / S⌋ + 1</div>
<p>Cas particuliers fréquents :</p>
<ul>
<li><strong>No padding (valid)</strong> : P = 0, sortie = ⌊(H − K)/S⌋ + 1</li>
<li><strong>Same padding</strong> : on choisit P pour que sortie = entrée. Pour S=1, P = (K−1)/2</li>
</ul>
</div>

<h2>Exemples de calcul</h2>
<ul>
<li>H=32, K=3, P=0, S=1 → sortie = (32-3)/1 + 1 = <strong>30</strong></li>
<li>H=32, K=3, P=1, S=1 (same) → sortie = (32+2-3)/1 + 1 = <strong>32</strong></li>
<li>H=32, K=5, P=0, S=1 → sortie = (32-5)/1 + 1 = <strong>28</strong></li>
<li>H=32, K=3, P=0, S=2 → sortie = ⌊(32-3)/2⌋ + 1 = <strong>15</strong></li>
</ul>

<h2>Le pooling : réduire la dimension spatiale</h2>
<p>Le <strong>max-pooling</strong> (le plus courant) glisse une fenêtre (généralement 2×2 stride 2) et garde le maximum. L'<strong>average pooling</strong> fait la moyenne.</p>

<div class="tip-box">
<div class="tip-title">💡 Pourquoi max-pooling plutôt qu'average</div>
<ol>
<li>Il conserve les activations les plus fortes (détails saillants)</li>
<li>Il est plus robuste aux petites translations</li>
<li>L'average diluerait les signaux importants</li>

function save() {
  localStorage.setItem('lang', state.lang);
  localStorage.setItem('currentSection', state.currentSection);
  localStorage.setItem('doneSections', JSON.stringify(state.doneSections));
  localStorage.setItem('examDate', state.examDate);
  localStorage.setItem('quizAnswers', JSON.stringify(state.quizAnswers));
}

// ============================================================
// RENDER
// ============================================================
function setLang(lang) {
  state.lang = lang; save();
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = T[lang][el.dataset.i18n]; });
  renderNav(); renderContent(); renderCountdown();
}

function renderCountdown() {
  const target = new Date(state.examDate + 'T00:00:00');
  const now = new Date();
  const diff = target - now;
  const days = Math.floor(diff / 86400000);
  const el = document.getElementById('cd-val');
  if (days >= 0) {
    el.textContent = days + ' ' + T[state.lang].days;
    el.style.color = days < 7 ? '#FF6B6B' : days < 14 ? '#FFD700' : '#90EE90';
  } else {
    el.textContent = state.lang === 'fr' ? 'Date dépassée' : 'Date passed';
    el.style.color = '#FF6B6B';
  }
}

function renderNav() {
  const list = document.getElementById('nav-list');
  list.innerHTML = SECTIONS.map(s => {
    const isDone = state.doneSections.includes(s.id);
    const isActive = state.currentSection === s.id;
    const t = s[state.lang].title;
    const pri = s.priority ? `<span class="priority-tag">${T[state.lang].priority}</span>` : '';
    return `<li class="nav-item ${isActive ? 'active' : ''} ${isDone ? 'done' : ''} ${s.priority ? 'priority' : ''}" onclick="goTo('${s.id}')">
      <span class="check">${isDone ? '✓' : ''}</span>
      <span>${s.icon} ${t}${pri}</span>
    </li>`;
  }).join('');

  const pct = Math.round((state.doneSections.length / SECTIONS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
}

function goTo(id) {
  state.currentSection = id; save();
  renderNav(); renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleDone(id) {
  const idx = state.doneSections.indexOf(id);
  if (idx >= 0) state.doneSections.splice(idx, 1);
  else state.doneSections.push(id);
  save(); renderNav(); renderContent();
}

function renderContent() {
  const section = SECTIONS.find(s => s.id === state.currentSection);
  if (!section) return;
  const t = section[state.lang];
  const isDone = state.doneSections.includes(section.id);
  const doneLabel = isDone ? T[state.lang].isDone : T[state.lang].markDone;
  const html = `
    <h1>${section.icon} ${t.title}</h1>
    <p class="subtitle">${t.subtitle}</p>
    ${t.content}
    ${section.id !== 'quiz' ? `<button class="mark-done-btn ${isDone ? 'done' : ''}" onclick="toggleDone('${section.id}')">${doneLabel}</button>` : ''}
  `;
  document.getElementById('content').innerHTML = html;
  if (section.id === 'quiz') renderQuiz();
}

// ============================================================
// QUIZ MODULE
// ============================================================
function renderQuiz() {
  const app = document.getElementById('quiz-app');
  const topics = [...new Set(QUIZZES.map(q => q.topic))];

  const filtered = state.quizTopicFilter === 'all' ? QUIZZES : QUIZZES.filter(q => q.topic === state.quizTopicFilter);
  if (state.quizCurrent >= filtered.length) state.quizCurrent = 0;
  const q = filtered[state.quizCurrent];
  if (!q) { app.innerHTML = '<p>Pas de question pour ce thème.</p>'; return; }
  const qKey = QUIZZES.indexOf(q);
  const ans = state.quizAnswers[qKey];
  const correctScore = Object.entries(state.quizAnswers).filter(([k,v]) => v === QUIZZES[k][state.lang].correct).length;

  let topicLabels = { all: T[state.lang].all };
  topics.forEach(tp => {
    const qWithLabel = QUIZZES.find(qq => qq.topic === tp);
    topicLabels[tp] = qWithLabel['topic' + state.lang.charAt(0).toUpperCase() + state.lang.slice(1)] || tp;
  });

  const filterButtons = ['all', ...topics].map(tp => `
    <button class="filter-btn ${state.quizTopicFilter === tp ? 'active' : ''}" onclick="setQuizFilter('${tp}')">${topicLabels[tp]}</button>
  `).join('');

  const qData = q[state.lang];
  const optsHtml = qData.opts.map((o, i) => {
    let cls = '';
    if (ans !== undefined) {
      if (i === qData.correct) cls = 'correct';
      else if (i === ans) cls = 'wrong';
    }
    return `<button class="quiz-option ${cls}" onclick="answerQuiz(${qKey}, ${i})">${o}</button>`;
  }).join('');

  app.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${correctScore} / ${Object.keys(state.quizAnswers).length || 0}</div><div class="stat-label">${T[state.lang].quizScore}</div></div>
      <div class="stat-card"><div class="stat-num">${filtered.length}</div><div class="stat-label">${state.lang === 'fr' ? 'Questions' : 'Questions'}</div></div>
      <div class="stat-card"><div class="stat-num">${state.quizCurrent + 1}</div><div class="stat-label">${state.lang === 'fr' ? 'Actuelle' : 'Current'}</div></div>
    </div>
    <div class="quiz-filters">${filterButtons}</div>
    <div class="quiz-question">
      <div class="q-text">Q${state.quizCurrent + 1}. ${qData.q}</div>
      <div class="quiz-options">${optsHtml}</div>
      <div class="quiz-explanation ${ans !== undefined ? 'visible' : ''}">
        <strong>${ans === qData.correct ? '✓ ' + (state.lang === 'fr' ? 'Bonne réponse !' : 'Correct!') : '✗ ' + (state.lang === 'fr' ? 'Mauvaise réponse.' : 'Incorrect.')}</strong> ${qData.exp}
      </div>
    </div>
    <div class="quiz-controls">
      <button class="btn btn-secondary" onclick="prevQuiz()">← ${T[state.lang].prevQ}</button>
      <button class="btn btn-primary" onclick="nextQuiz()">${T[state.lang].nextQ} →</button>
    </div>
    <button class="btn btn-secondary" style="margin-top: 1rem;" onclick="resetQuiz()">↻ ${T[state.lang].resetQuiz}</button>
  `;
}

function setQuizFilter(tp) { state.quizTopicFilter = tp; state.quizCurrent = 0; renderQuiz(); }
function answerQuiz(qKey, idx) { state.quizAnswers[qKey] = idx; save(); renderQuiz(); }
function nextQuiz() {
  const filtered = state.quizTopicFilter === 'all' ? QUIZZES : QUIZZES.filter(q => q.topic === state.quizTopicFilter);
  state.quizCurrent = (state.quizCurrent + 1) % filtered.length;
  renderQuiz();
}
function prevQuiz() {
  const filtered = state.quizTopicFilter === 'all' ? QUIZZES : QUIZZES.filter(q => q.topic === state.quizTopicFilter);
  state.quizCurrent = (state.quizCurrent - 1 + filtered.length) % filtered.length;
  renderQuiz();
}
function resetQuiz() {
  if (!confirm(state.lang === 'fr' ? 'Recommencer le quiz ?' : 'Restart quiz?')) return;
  state.quizAnswers = {}; state.quizCurrent = 0; save(); renderQuiz();
}

// ============================================================
// INIT
// ============================================================
document.getElementById('exam-date').value = state.examDate;
document.getElementById('exam-date').addEventListener('change', e => {
  state.examDate = e.target.value; save(); renderCountdown();
});

setLang(state.lang);
setInterval(renderCountdown, 60000); // refresh every minute
</script>
</body>
</html>
